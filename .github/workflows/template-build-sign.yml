name: Build and sign images

on:
  workflow_call:
    inputs:
      version:
        description: "Image version tag (e.g. canary, 0.9.0)"
        type: string
        required: true
      image-registry:
        description: "Container registry hostname"
        type: string
        default: ghcr.io
      image-repo:
        description: "Registry namespace / org (will be lowercased internally)"
        type: string
        required: true
    outputs:
      operator-digest:
        description: "Published operator image index digest (sha256:...)"
        value: ${{ jobs.build.outputs.operator-digest }}
      interceptor-digest:
        description: "Published interceptor image index digest (sha256:...)"
        value: ${{ jobs.build.outputs.interceptor-digest }}
      scaler-digest:
        description: "Published scaler image index digest (sha256:...)"
        value: ${{ jobs.build.outputs.scaler-digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing via GitHub OIDC
    outputs:
      operator-digest:    ${{ steps.publish-operator.outputs.digest }}
      interceptor-digest: ${{ steps.publish-interceptor.outputs.digest }}
      scaler-digest:      ${{ steps.publish-scaler.outputs.digest }}
    env:
      KO_RELEASE_PLATFORMS: linux/amd64,linux/arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"
      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ inputs.image-repo }}
          password: ${{ github.token }}
          registry: ${{ inputs.image-registry }}

      # ko build --bare prints exactly one line to stdout: image@sha256:<digest>.
      # Build progress and errors go to stderr, which remains visible in workflow logs.
      # make -s suppresses the recipe echo so only ko's output reaches stdout,
      # keeping the captured ref clean for parsing.
      - name: Publish operator image
        id: publish-operator
        env:
          IMAGE_REGISTRY: ${{ inputs.image-registry }}
          IMAGE_REPO_INPUT: ${{ inputs.image-repo }}
          VERSION: ${{ inputs.version }}
        run: |
          export IMAGE_REPO="${IMAGE_REPO_INPUT,,}"
          ref=$(make -s ko-publish-operator)
          echo "digest=${ref##*@}" >> "$GITHUB_OUTPUT"
          echo "Operator published: ${ref}"

      - name: Publish interceptor image
        id: publish-interceptor
        env:
          IMAGE_REGISTRY: ${{ inputs.image-registry }}
          IMAGE_REPO_INPUT: ${{ inputs.image-repo }}
          VERSION: ${{ inputs.version }}
        run: |
          export IMAGE_REPO="${IMAGE_REPO_INPUT,,}"
          ref=$(make -s ko-publish-interceptor)
          echo "digest=${ref##*@}" >> "$GITHUB_OUTPUT"
          echo "Interceptor published: ${ref}"

      - name: Publish scaler image
        id: publish-scaler
        env:
          IMAGE_REGISTRY: ${{ inputs.image-registry }}
          IMAGE_REPO_INPUT: ${{ inputs.image-repo }}
          VERSION: ${{ inputs.version }}
        run: |
          export IMAGE_REPO="${IMAGE_REPO_INPUT,,}"
          ref=$(make -s ko-publish-scaler)
          echo "digest=${ref##*@}" >> "$GITHUB_OUTPUT"
          echo "Scaler published: ${ref}"

      - name: Log published image digests
        run: |
          echo "operator:    ${{ steps.publish-operator.outputs.digest }}"
          echo "interceptor: ${{ steps.publish-interceptor.outputs.digest }}"
          echo "scaler:      ${{ steps.publish-scaler.outputs.digest }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Check Cosign install
        run: cosign version

      - name: Sign images
        # Signs the image index digest for each component.
        # IMAGE_*_DIGEST values come from the publish steps above.
        # IMAGE_REPO is lowercased to satisfy GHCR naming requirements.
        env:
          IMAGE_REGISTRY: ${{ inputs.image-registry }}
          IMAGE_REPO_INPUT: ${{ inputs.image-repo }}
          VERSION: ${{ inputs.version }}
          IMAGE_OPERATOR_DIGEST:    ${{ steps.publish-operator.outputs.digest }}
          IMAGE_INTERCEPTOR_DIGEST: ${{ steps.publish-interceptor.outputs.digest }}
          IMAGE_SCALER_DIGEST:      ${{ steps.publish-scaler.outputs.digest }}
        run: |
          export IMAGE_REPO="${IMAGE_REPO_INPUT,,}"
          make sign-images
