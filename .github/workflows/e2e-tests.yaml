name: e2e tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e_tests:
    runs-on: ${{ matrix.runner }}
    name: e2e ${{ matrix.arch }} / ${{ matrix.kindVersion }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - AMD64
          - ARM64
        kindVersion:
          # renovate: datasource=docker depName=kindest/node
          - v1.36.1
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.35.1
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.34.3
        include:
          - arch: AMD64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: ARM64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"

      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        env:
          # renovate: datasource=github-releases depName=helm/helm
          HELM_VERSION: "v4.2.2"
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        env:
          # renovate: datasource=github-releases depName=kubernetes-sigs/kind
          KIND_VERSION: "v0.32.0"
        with:
          node_image: kindest/node:${{ matrix.kindVersion }}
          cluster_name: kind
          version: ${{ env.KIND_VERSION }}

      - name: Setup e2e environment
        run: make e2e-setup
        env:
          KO_DOCKER_REPO: kind.local
          KO_DEFAULTPLATFORMS: ${{ matrix.platform }} # only need target arch
          VERSION: ${{ github.sha }}

      - name: Run e2e tests
        run: make e2e-test-ci
        env:
          KO_DOCKER_REPO: kind.local

  e2e_tests_legacy:
    runs-on: ${{ matrix.runner }}
    name: e2e HTTPSO ${{ matrix.arch }} / ${{ matrix.kindVersion }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - AMD64
          - ARM64
        kindVersion:
          # renovate: datasource=docker depName=kindest/node
          - v1.36.1
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.35.1
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.34.3
        include:
          - arch: AMD64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: ARM64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"

      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        env:
          # renovate: datasource=github-releases depName=helm/helm
          HELM_VERSION: "v4.2.2"
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Create Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.kindVersion }}
          cluster_name: kind
          version: v0.31.0

      - name: Show Kubernetes version
        run: kubectl version

      - name: Run e2e test
        run: make e2e-test-legacy
        env:
          KO_DOCKER_REPO: kind.local
          KO_DEFAULTPLATFORMS: ${{ matrix.platform }} # only need target arch
          VERSION: ${{ github.sha }}

  e2e_summary:
    name: "e2e Summary"
    if: always()
    needs: [e2e_tests, e2e_tests_legacy]
    runs-on: ubuntu-latest
    steps:
      - if: |
          needs.e2e_tests.result == 'failure' ||
          needs.e2e_tests.result == 'cancelled' ||
          needs.e2e_tests_legacy.result == 'failure' ||
          needs.e2e_tests_legacy.result == 'cancelled'
        run: exit 1
