name: e2e tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e_tests:
    runs-on: ${{ matrix.runner }}
    name: e2e ${{ matrix.arch }} / ${{ matrix.kindVersion }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - AMD64
          - ARM64
        kindVersion:
          # renovate: datasource=docker depName=kindest/node
          - v1.35.0
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.34.3
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.33.7
        include:
          - arch: AMD64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: ARM64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"

      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@${GOTESTSUM_VERSION}
        env:
          # renovate: datasource=github-releases depName=gotestyourself/gotestsum
          GOTESTSUM_VERSION: "v1.13.0"

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        env:
          # renovate: datasource=github-releases depName=kubernetes-sigs/kind
          KIND_VERSION: "v0.31.0"
        with:
          node_image: kindest/node:${{ matrix.kindVersion }}
          cluster_name: kind
          version: ${{ env.KIND_VERSION }}

      - name: Setup e2e environment
        run: make e2e-setup
        env:
          KO_DOCKER_REPO: kind.local
          KO_DEFAULTPLATFORMS: ${{ matrix.platform }} # only need target arch
          VERSION: ${{ github.sha }}

      - name: Run e2e tests
        run: make e2e-test-ci

  e2e_tests_legacy:
    runs-on: ${{ matrix.runner }}
    name: e2e HTTPSO ${{ matrix.arch }} / ${{ matrix.kindVersion }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - AMD64
          - ARM64
        kindVersion:
          # renovate: datasource=docker depName=kindest/node
          - v1.35.0
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.34.3
          # renovate: datasource=docker depName=kindest/node@only-patch packageName=kindest/node
          - v1.33.7
        include:
          - arch: AMD64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: ARM64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"

      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.kindVersion }}
          cluster_name: kind
          version: v0.31.0

      - name: Show Kubernetes version
        run: kubectl version

      - name: Run e2e test
        run: make e2e-test-legacy
        env:
          KO_DOCKER_REPO: kind.local
          KO_DEFAULTPLATFORMS: ${{ matrix.platform }} # only need target arch
          VERSION: ${{ github.sha }}
