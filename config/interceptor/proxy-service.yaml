apiVersion: v1
kind: Service
metadata:
  name: interceptor-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: interceptor
    app.kubernetes.io/name: http-add-on
  ports:
    - name: proxy
      protocol: TCP
      port: 8080
      targetPort: proxy
    - name: proxy-tls
      protocol: TCP
      port: 8443
      targetPort: proxy-tls
