apiVersion: v1
kind: Service
metadata:
  name: operator-metrics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: operator
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  ports:
    - name: metrics-http
      protocol: TCP
      port: 8080
      targetPort: metrics-http
    - name: metrics-https
      protocol: TCP
      port: 8443
      targetPort: metrics-https
